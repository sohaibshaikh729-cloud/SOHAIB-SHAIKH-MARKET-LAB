<title>Sohaib Market Lab — Login</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0a0c10;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* LOGIN SCREEN */
.login-wrap{width:100%;max-width:420px;padding:24px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-circle{width:72px;height:72px;border-radius:50%;background:rgba(212,168,67,0.12);border:2px solid #d4a843;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#d4a843;margin:0 auto 14px;}
.login-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#f0c86a;}
.login-sub{font-size:12px;color:#8b90a0;margin-top:4px;}
.login-card{background:#10131a;border:1px solid rgba(255,255,255,0.07);border-top:2px solid #d4a843;border-radius:14px;padding:28px 24px;}
.login-card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#f0c86a;margin-bottom:20px;text-align:center;}
.field{margin-bottom:16px;}
.field-label{font-size:11px;font-weight:600;color:#8b90a0;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;display:block;}
.field-input{width:100%;background:#161b25;border:1px solid rgba(255,255,255,0.13);border-radius:8px;color:#e8eaf0;font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.15s;}
.field-input:focus{border-color:#d4a843;}
.login-btn{width:100%;background:#d4a843;color:#0a0c10;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;padding:12px;border:none;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-top:4px;}
.login-btn:hover{background:#f0c86a;transform:translateY(-1px);}
.login-btn:disabled{background:#454a5a;cursor:not-allowed;transform:none;}
.login-error{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-top:12px;text-align:center;display:none;}
.login-footer{text-align:center;margin-top:20px;font-size:10px;color:#454a5a;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:0.08em;}
.spinner-sm{width:16px;height:16px;border:2px solid rgba(10,12,16,0.3);border-top-color:#0a0c10;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN APP */
#app-frame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;}

// Initialize users in Firebase if not exists
async function initUsers() {
  try {
    const r = await fetch(FIREBASE_URL + '/sml_users.json');
    const data = await r.json();
    if (!data) {
      await fetch(FIREBASE_URL + '/sml_users.json', {
        method: 'PUT',
        body: JSON.stringify(DEFAULT_USERS)
      });
    }
  } catch(e) {}
}

async function doLogin() {
  const username = document.getElementById('inp-user').value.trim().toLowerCase();
  const password = document.getElementById('inp-pass').value.trim();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');

  if (!username || !password) {
    showError('Username aur password dono daalo!');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>Check ho raha hai...';
  err.style.display = 'none';

  try {
    const r = await fetch(FIREBASE_URL + '/sml_users/' + username + '.json');
    const user = await r.json();

    if (!user) {
      showError('❌ Username galat hai!');
    } else if (user.password !== password) {
      showError('❌ Password galat hai!');
    } else {
      // Login success!
      sessionStorage.setItem('sml_logged_in', '1');
      sessionStorage.setItem('sml_user', user.name);
      loadApp();
    }
  } catch(e) {
    showError('⚠️ Network error — dobara try karo!');
  }

  btn.disabled = false;
  btn.innerHTML = '🚀 Login Karo';
}

function showError(msg) {
  const err = document.getElementById('login-error');
  err.textContent = msg;
  err.style.display = 'block';
}
